

{% block content %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            background-color: #007bff;
            border: none;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        #errorMessage {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <h2 class="text-center mb-4">Staff Login</h2>
            
            <form id="loginForm" method="POST">
                {% csrf_token %}
                <div class="form-group mb-3">
                    <label for="email">Email Address:</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>

                <div class="form-group mb-3">
                    <label for="password">Password:</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>

                <button type="submit" id="btn" class="btn btn-primary w-100">Login</button>
            </form>
            
            <div id="errorMessage" class="alert alert-danger mt-3">
                Invalid credentials. Please try again.
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault(); // Prevent default submission

            var email = $('#email').val().trim();
            var password = $('#password').val().trim();

            if (!email) {
                alert("Email field is empty");
                return;
            }
            if (!password) {
                alert("Password field is empty");
                return;
            }

            var formData = new FormData();
            formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');
            formData.append('email', email);
            formData.append('password', password);

            $.ajax({
                url: '{% url "Staff:user_login" %}',  
                method: "POST",
                data: formData,
                contentType: false,
                processData: false,
                dataType: 'json',
                success: function(data) {
                    if (data.success) {
                        alert("Logged in as Staff");
                        window.location.href = '{% url "Staff:staff_home" %}'; 
                    } else {
                        $('#errorMessage').text(data.message).show();
                    }
                },
                error: function(xhr, status, error) {
                    console.log("Error:", xhr.responseText);
                    alert("An unexpected error occurred. Please try again.");
                }
            });
        });
    </script>
</body>
{% endblock content %}
