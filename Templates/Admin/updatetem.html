{% extends 'Admin/adminhome.html' %}

{% load static %}

{% block content %}
<body>
    <div class="container my-5">
        <h1 class="text-center mb-4">Update Template</h1>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="image1" class="form-label">Image 1 (Upload New Image)</label>
                <input type="file" class="form-control" id="image1" name="image1">
                {% if tem_details.image1 %}
                    <img src="{{ tem_details.image1.url }}" alt="Image 1" class="img-fluid mt-2" width="200">
                {% endif %}
            </div>

            <div class="mb-3">
                <label for="image2" class="form-label">Image 2 (Upload New Image)</label>
                <input type="file" class="form-control" id="image2" name="image2">
                {% if tem_details.image2 %}
                    <img src="{{ tem_details.image2.url }}" alt="Image 2" class="img-fluid mt-2" width="200">
                {% endif %}
            </div>

            <div class="mb-3">
                <label for="image3" class="form-label">Image 3 (Upload New Image)</label>
                <input type="file" class="form-control" id="image3" name="image3">
                {% if tem_details.image3 %}
                    <img src="{{ tem_details.image3.url }}" alt="Image 3" class="img-fluid mt-2" width="200">
                {% endif %}
            </div>

            <div class="mb-3">
                <label for="price" class="form-label">Price</label>
                <input type="number" step="0.01" class="form-control" id="price" name="price" value="{{ tem_details.price }}" required>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="4" required>{{ tem_details.description }}</textarea>
            </div>

            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>

        <a href="{% url 'Admin:view_templates' %}" class="btn btn-secondary my-3">Back to Template List</a>
    </div>

    <!-- Bootstrap JS (optional for interactive elements like modals, dropdowns, etc.) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    {% endblock content %}
